    <rect x="240" y="240" width="20" height="20"/>
    <rect x="268" y="240" width="20" height="20"/>
    <rect x="240" y="268" width="20" height="20"/>
    <rect x="296" y="268" width="20" height="20"/>
    <rect x="268" y="296" width="20" height="20"/>
    <rect x="240" y="324" width="20" height="20"/>
    <rect x="296" y="324" width="20" height="20"/>
    <rect x="324" y="296" width="20" height="20"/>
